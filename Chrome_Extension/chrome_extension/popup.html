<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PBR 推送</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
    font-size: 13px;
    background: #f5f7fa;
    color: #1f252c;
    width: 400px;
    min-height: 330px;
    padding: 12px;
  }
  h1 { font-size: 16px; margin-bottom: 10px; }
  .panel {
    background: #fff;
    border: 1px solid #d6dde5;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: #97a2ad; }
  .dot.online { background: #34a853; }
  .dot.offline { background: #d93025; }
  .status-text { flex: 1; }
  .target {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .target button.active { background: #2563eb; color: #fff; }
  input[type="number"] {
    width: 96px;
    padding: 6px 8px;
    border: 1px solid #c6d0da;
    border-radius: 6px;
    background: #fff;
  }
  button {
    flex: 1;
    min-width: 76px;
    padding: 7px 8px;
    border: 1px solid #cbd5df;
    border-radius: 6px;
    background: #eef2f7;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; font-weight: 700; }
  button.good { background: #16a34a; color: #fff; border-color: #16a34a; font-weight: 700; }
  button.danger { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
  button:disabled { opacity: 0.45; cursor: default; }
  .hint, .footer, .page-info {
    font-size: 11px;
    color: #5f6b76;
    line-height: 1.45;
    margin-bottom: 8px;
  }
  .pending-box {
    background: #fff;
    border: 1px solid #d6dde5;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 10px;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
    font-size: 11px;
    color: #4d5965;
  }
  .pending-box.empty { color: #97a2ad; font-style: italic; }
</style>
</head>
<body>
<h1>PBR 推送</h1>

<div class="panel">
  <div class="target">
    <button id="target-max">推送到 Max</button>
    <button id="target-ue">推送到 UE</button>
  </div>
  <div class="row">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">尚未检测</span>
  </div>
  <div class="row">
    <label for="port-input">端口</label>
    <input id="port-input" type="number" min="1025" max="65535" step="1" />
    <button id="btn-save-port">保存</button>
    <button id="btn-check-port" class="primary">连接</button>
  </div>
  <div class="hint" id="port-hint">Max 默认 19527，UE 默认 19528。点击「连接」后扩展开始工作。</div>
</div>

<div class="page-info" id="page-info">正在扫描页面链接...</div>
<div id="pending-box" class="pending-box empty">没有待发送链接</div>

<div class="row">
  <button id="btn-push-page" class="primary">推送本页链接</button>
  <button id="btn-retry">重试队列</button>
</div>
<div class="row">
  <button id="btn-push-page-ue" class="good">推送本页到 UE</button>
  <button id="btn-clear" class="danger">清空队列</button>
</div>
<div class="row">
  <button id="btn-open-ai">打开 AI 面板</button>
</div>

<div class="footer">修改后请在 Chrome 扩展管理页面重新加载插件。</div>
<script src="popup.js"></script>
</body>
</html>
